<title>Sistema para Restaurante e Lanchonete | RGA Tech Solutions</title>
<meta name="description" content="Demonstração do sistema para restaurantes: pedidos por mesa, painel da cozinha, cardápio digital e delivery.">
<meta name="keywords" content="sistema para restaurante, comanda eletrônica, cardápio digital, delivery">
<meta property="og:title" content="Sistema para Restaurante e Lanchonete | RGA Tech Solutions">
<meta property="og:description" content="Demonstração do sistema para restaurantes: pedidos por mesa, painel da cozinha, cardápio digital e delivery.">
<meta property="og:locale" content="pt_BR">
<link rel="canonical" href="/segmentos/restaurantes/">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy-900:#060d1c;--navy-850:#0a1426;--navy-800:#0b1a30;--navy-700:#0e2038;
  --blue:#2f6bff;--green:#00e599;--green-deep:#03b277;
  --bg:#f3f6fb;--card:#ffffff;--line:#e7ecf4;--line2:#eef2f8;
  --ink:#0c1626;--ink2:#3a475d;--muted:#6a7892;--muted2:#9aa7bd;
  --sb-text:#aebaceff;
  --pill-green-b:#e3faf1;--pill-green-t:#03875a;
  --pill-amber-b:#fff3e0;--pill-amber-t:#b9690a;
  --pill-blue-b:#e7efff;--pill-blue-t:#1f53d6;
  --pill-gray-b:#eef1f6;--pill-gray-t:#5a6a86;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:hidden}
h1,h2,h3,h4{font-family:'Sora',sans-serif;letter-spacing:-.02em;line-height:1.12}
a{color:inherit;text-decoration:none}
svg{display:block}
.mono{font-family:'JetBrains Mono',monospace}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ---------- buttons ---------- */
.btn{display:inline-flex;align-items:center;gap:8px;font-family:'Sora',sans-serif;font-weight:600;font-size:.88rem;padding:10px 18px;border-radius:10px;transition:transform .18s,box-shadow .18s,background .18s,border-color .18s;white-space:nowrap}
.btn svg{width:16px;height:16px}
.btn-green{background:var(--green);color:#06231a;box-shadow:0 10px 22px -10px rgba(0,229,153,.7)}
.btn-green:hover{transform:translateY(-2px);box-shadow:0 16px 30px -12px rgba(0,229,153,.8)}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:hover{transform:translateY(-2px)}
.btn-outline{background:#fff;color:var(--ink);border:1.5px solid var(--line)}
.btn-outline:hover{border-color:var(--blue);color:var(--blue);transform:translateY(-2px)}
.btn-ghost{background:transparent;color:var(--sb-text);border:1px solid rgba(255,255,255,.12)}
.btn-ghost:hover{background:rgba(255,255,255,.08);color:#fff}
.btn-sm{padding:8px 13px;font-size:.8rem}

/* ---------- logo ---------- */
.logo{display:flex;align-items:center;gap:11px}
.logo-mark{width:38px;height:38px;flex-shrink:0;border-radius:10px;overflow:hidden;box-shadow:0 6px 16px -6px rgba(47,107,255,.6)}
.logo-name b{font-family:'Sora';font-weight:800;font-size:1.02rem;line-height:1;display:block;letter-spacing:-.02em}
.logo-name b .t{color:var(--blue)}
.logo-name small{font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;color:var(--green);font-family:'JetBrains Mono'}

/* =========================================================
   HOME (launcher)
========================================================= */
#home{min-height:100vh;background:var(--navy-850);color:#fff;position:relative;overflow:hidden;display:none;flex-direction:column}
#home.active{display:flex}
#home::before{content:"";position:absolute;inset:0;background:
  radial-gradient(820px 520px at 82% 6%,rgba(47,107,255,.26),transparent 60%),
  radial-gradient(720px 600px at 8% 96%,rgba(0,229,153,.13),transparent 60%);}
.home-grid-tex{position:absolute;inset:0;opacity:.5;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:56px 56px;mask-image:radial-gradient(circle at 50% 30%,#000,transparent 80%)}
.home-top{position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;padding:22px 5vw}
.home-top .logo-name b{color:#fff}
.online{display:inline-flex;align-items:center;gap:8px;font-size:.74rem;font-family:'JetBrains Mono';color:var(--green);background:rgba(0,229,153,.1);border:1px solid rgba(0,229,153,.3);padding:6px 13px;border-radius:30px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 rgba(0,229,153,.6);animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(0,229,153,.5)}70%{box-shadow:0 0 0 8px rgba(0,229,153,0)}100%{box-shadow:0 0 0 0 rgba(0,229,153,0)}}
.home-hero{position:relative;z-index:2;text-align:center;padding:26px 5vw 6px}
.home-eyebrow{display:inline-flex;align-items:center;gap:8px;font-family:'JetBrains Mono';font-size:.76rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--green);margin-bottom:16px}
.home-hero h1{font-size:clamp(2rem,4.6vw,3.4rem);font-weight:800;margin-bottom:16px}
.home-hero h1 .hl{background:linear-gradient(120deg,var(--green),#7af5cf);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.home-hero p{color:rgba(255,255,255,.72);font-size:1.08rem;max-width:620px;margin:0 auto 8px}
.home-sub{color:var(--muted2)!important;font-size:.92rem!important;font-family:'JetBrains Mono'}
.modules{position:relative;z-index:2;max-width:1180px;margin:0 auto;padding:38px 24px 30px;width:100%;
  display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
.mod-card{background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:22px;text-align:left;color:#fff;cursor:pointer;transition:transform .22s,border-color .22s,background .22s,box-shadow .22s;position:relative;overflow:hidden}
.mod-card::before{content:"";position:absolute;top:0;left:0;width:100%;height:3px;background:var(--acc);transform:scaleX(0);transform-origin:left;transition:transform .3s}
.mod-card:hover{transform:translateY(-6px);background:rgba(255,255,255,.07);border-color:rgba(0,229,153,.4);box-shadow:0 26px 50px -28px rgba(0,0,0,.7)}
.mod-card:hover::before{transform:scaleX(1)}
.mod-ico{width:50px;height:50px;border-radius:13px;display:grid;place-items:center;margin-bottom:16px;background:color-mix(in srgb,var(--acc) 18%,transparent);color:var(--acc)}
.mod-ico svg{width:26px;height:26px}
.mod-card h3{font-size:1.12rem;margin-bottom:7px}
.mod-card p{color:rgba(255,255,255,.6);font-size:.85rem;margin-bottom:16px;min-height:38px}
.mod-open{display:inline-flex;align-items:center;gap:7px;color:var(--acc);font-family:'Sora';font-weight:600;font-size:.85rem;transition:gap .2s}
.mod-open svg{width:15px;height:15px}
.mod-card:hover .mod-open{gap:12px}
.home-foot{position:relative;z-index:2;text-align:center;padding:14px 24px 26px;color:var(--muted2);font-size:.82rem}
.home-foot a{color:var(--green)}

/* =========================================================
   APP SHELL (module pages)
========================================================= */
#app{display:none;min-height:100vh}
#app.active{display:grid;grid-template-columns:248px 1fr}
.sidebar{background:linear-gradient(180deg,var(--navy-800),var(--navy-900));color:var(--sb-text);position:fixed;top:0;left:0;bottom:0;width:248px;display:flex;flex-direction:column;z-index:60;transition:transform .3s}
.sb-logo{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-logo .logo-name b{color:#fff}
.sb-badge{margin:14px 20px 6px;font-family:'JetBrains Mono';font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted2)}
.sb-nav{flex:1;overflow-y:auto;padding:4px 12px}
.sb-item{display:flex;align-items:center;gap:12px;width:100%;padding:11px 13px;border-radius:10px;color:var(--sb-text);font-weight:600;font-size:.9rem;font-family:'Sora';text-align:left;margin-bottom:3px;transition:background .18s,color .18s;position:relative}
.sb-item svg{width:18px;height:18px;flex-shrink:0;opacity:.9}
.sb-item:hover{background:rgba(255,255,255,.05);color:#fff}
.sb-item.on{background:color-mix(in srgb,var(--acc) 16%,transparent);color:#fff}
.sb-item.on::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:3px;background:var(--acc)}
.sb-item.on svg{color:var(--acc);opacity:1}
.sb-foot{padding:14px 14px 16px;border-top:1px solid rgba(255,255,255,.07)}
.sb-user{display:flex;align-items:center;gap:10px;padding:8px 6px 14px}
.sb-ava{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--blue),var(--navy-700));display:grid;place-items:center;color:#fff;font-family:'Sora';font-weight:700;font-size:.85rem}
.sb-user b{font-size:.82rem;color:#fff;font-family:'Sora';display:block;line-height:1.1}
.sb-user span{font-size:.7rem;color:var(--muted2)}

.main{grid-column:2;min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:40;height:64px;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 26px;gap:16px}
.tb-left{display:flex;align-items:center;gap:14px;min-width:0}
.crumb{font-size:.82rem;color:var(--muted)}
.crumb b{color:var(--ink);font-family:'Sora'}
.crumb .acc{color:var(--acc-d)}
.search{display:flex;align-items:center;gap:9px;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:9px 13px;color:var(--muted);font-size:.85rem;width:230px}
.search svg{width:15px;height:15px}
.search input{border:none;background:none;outline:none;font-family:inherit;font-size:.85rem;color:var(--ink);width:100%}
.tb-right{display:flex;align-items:center;gap:12px}
.iconbtn{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;background:var(--bg);border:1px solid var(--line);color:var(--ink2);position:relative;transition:.18s}
.iconbtn:hover{border-color:var(--blue);color:var(--blue)}
.iconbtn svg{width:18px;height:18px}
.iconbtn .badge{position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;background:var(--green);color:#06231a;font-size:.6rem;font-weight:700;display:grid;place-items:center;border:2px solid #fff}
.menu-toggle{display:none}
.tb-ava{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--navy-700));display:grid;place-items:center;color:#fff;font-family:'Sora';font-weight:700;font-size:.85rem}

.content{padding:28px 26px 44px;max-width:1280px;width:100%}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;flex-wrap:wrap;margin-bottom:24px}
.page-head .mod-tag{display:inline-flex;align-items:center;gap:8px;font-family:'JetBrains Mono';font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--acc-d);font-weight:600;margin-bottom:9px}
.page-head h1{font-size:1.7rem;margin-bottom:6px}
.page-head p{color:var(--muted);font-size:.96rem}
.head-actions{display:flex;gap:10px;flex-wrap:wrap}

/* KPI */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 18px;box-shadow:0 10px 26px -22px rgba(12,22,45,.5)}
.kpi .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.kpi .lbl{font-size:.78rem;color:var(--muted);font-weight:600}
.kpi .kico{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;background:color-mix(in srgb,var(--acc) 14%,transparent);color:var(--acc-d)}
.kpi .kico svg{width:18px;height:18px}
.kpi .val{font-family:'Sora';font-size:1.7rem;font-weight:800;color:var(--ink);line-height:1}
.kpi .delta{font-size:.76rem;font-weight:700;margin-top:8px;display:inline-flex;align-items:center;gap:4px}
.kpi .delta.up{color:var(--green-deep)}
.kpi .delta.down{color:#d6453d}

/* two-col */
.row2{display:grid;grid-template-columns:1.6fr 1fr;gap:16px;margin-bottom:20px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;box-shadow:0 10px 26px -22px rgba(12,22,45,.5)}
.panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.panel-head h3{font-size:1.05rem}
.panel-head .legend{font-size:.74rem;color:var(--muted);display:flex;align-items:center;gap:7px}
.panel-head .legend i{width:9px;height:9px;border-radius:3px;background:var(--acc);display:inline-block}
.summary-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line2)}
.summary-item:last-child{border-bottom:none}
.summary-item .si-ic{width:34px;height:34px;border-radius:9px;background:color-mix(in srgb,var(--acc) 13%,transparent);color:var(--acc-d);display:grid;place-items:center;flex-shrink:0}
.summary-item .si-ic svg{width:16px;height:16px}
.summary-item b{font-size:.86rem;font-family:'Sora';display:block;line-height:1.2}
.summary-item span{font-size:.76rem;color:var(--muted)}
.summary-item .pill{margin-left:auto}

/* table */
.table-card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:0 10px 26px -22px rgba(12,22,45,.5);overflow:hidden}
.tc-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--line)}
.tc-head h3{font-size:1.05rem}
.tc-head .tools{display:flex;gap:9px;align-items:center}
.chip{font-size:.76rem;color:var(--muted);background:var(--bg);border:1px solid var(--line);padding:6px 11px;border-radius:8px;font-weight:600}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:560px}
th{text-align:left;font-family:'Sora';font-size:.72rem;letter-spacing:.04em;text-transform:uppercase;color:var(--muted2);font-weight:600;padding:13px 20px;background:var(--line2)}
td{padding:14px 20px;font-size:.88rem;color:var(--ink2);border-bottom:1px solid var(--line2)}
tbody tr{transition:background .15s}
tbody tr:hover{background:var(--bg)}
tbody tr:last-child td{border-bottom:none}
td .strong{color:var(--ink);font-weight:600}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:.74rem;font-weight:700;padding:4px 10px;border-radius:20px}
.pill::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
.pill.green{background:var(--pill-green-b);color:var(--pill-green-t)}
.pill.amber{background:var(--pill-amber-b);color:var(--pill-amber-t)}
.pill.blue{background:var(--pill-blue-b);color:var(--pill-blue-t)}
.pill.gray{background:var(--pill-gray-b);color:var(--pill-gray-t)}

/* toast */
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(80px);background:var(--navy-800);color:#fff;border:1px solid rgba(0,229,153,.4);border-radius:12px;padding:13px 18px;display:flex;align-items:center;gap:12px;box-shadow:0 20px 50px -16px rgba(0,0,0,.6);z-index:200;opacity:0;transition:transform .35s,opacity .35s;max-width:90vw}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast svg{width:20px;height:20px;color:var(--green);flex-shrink:0}
.toast b{font-family:'Sora';font-size:.9rem}
.toast span{font-size:.8rem;color:var(--muted2);display:block}
.toast .toast-cta{margin-left:6px;background:var(--green);color:#06231a;font-family:'Sora';font-weight:700;font-size:.78rem;padding:7px 12px;border-radius:8px}

.overlay{display:none;position:fixed;inset:0;background:rgba(6,13,28,.5);z-index:55}
.overlay.show{display:block}

/* ---------- responsive ---------- */
@media(max-width:1024px){ .modules{grid-template-columns:repeat(3,1fr)} }
@media(max-width:900px){
  #app.active{grid-template-columns:1fr}
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{grid-column:1}
  .menu-toggle{display:grid}
  .search{display:none}
  .row2{grid-template-columns:1fr}
  .kpis{grid-template-columns:repeat(2,1fr)}
  .modules{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:560px){
  .kpis{grid-template-columns:1fr 1fr}
  .modules{grid-template-columns:1fr}
  .home-top{padding:18px 22px}
  .tb-right .demo-text{display:none}
  .content{padding:20px 16px 40px}
}

.erp{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
.tb-left .btn{flex-shrink:0}
@media(max-width:900px){.erp{grid-template-columns:1fr}}
@media(max-width:560px){.crumb{display:none}.backtxt{display:none}}

function cell(c){
  if(c && typeof c==="object"){
    if(c.pill) return '<span class="pill '+c.pill+'">'+c.v+'</span>';
    if(c.strong) return '<span class="strong">'+c.strong+'</span>';
  }
  return c;
}
function miniChart(ch,acc){
  const W=560,H=210,pad=26,n=ch.values.length,max=Math.max(...ch.values);
  const slot=(W-pad*2)/n, bw=slot*0.5;
  let g="";
  for(let k=1;k<=3;k++){const y=pad+(H-pad*2)*(k/4);g+='<line x1="'+pad+'" y1="'+y+'" x2="'+(W-pad)+'" y2="'+y+'" stroke="#eef2f8" stroke-width="1"/>';}
  ch.values.forEach((v,i)=>{
    const h=Math.max(4,(v/max)*(H-pad*2-10)), x=pad+i*slot+(slot-bw)/2, y=H-pad-h;
    g+='<rect x="'+x+'" y="'+y+'" width="'+bw+'" height="'+h+'" rx="5" fill="'+acc+'"><title>'+ch.labels[i]+': '+v+'</title></rect>';
    g+='<text x="'+(x+bw/2)+'" y="'+(H-8)+'" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="10" fill="#9aa7bd">'+ch.labels[i]+'</text>';
  });
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" preserveAspectRatio="xMidYMid meet">'+g+'</svg>';
}

function trendIco(delta){return ico("chart",'style="width:13px;height:13px'+(String(delta).startsWith("-")?";transform:scaleY(-1)":"")+'"');}

}
function renderContent(){

  document.getElementById("content").innerHTML=
    '<div class="page-head"><div>'+
      '<span class="mod-tag">'+ico(m.icon,'style="width:14px;height:14px"')+m.name+'</span>'+
      '<h1>'+tab.title+'</h1><p>'+tab.sub+'</p></div>'+
      '<div class="head-actions">'+actions+'</div>'+
    '</div>'+
    '<div class="kpis">'+kpis+'</div>'+
    '<div class="row2">'+
      '<div class="panel"><div class="panel-head"><h3>'+m.chart.title+'</h3><span class="legend"><i></i> Período atual</span></div>'+miniChart(m.chart,m.acc)+'</div>'+
      '<div class="panel"><div class="panel-head"><h3>'+m.summary.title+'</h3></div>'+summary+'</div>'+
    '</div>'+
    '<div class="table-card"><div class="tc-head"><h3>'+tab.title+'</h3><div class="tools"><span class="chip">Hoje</span><span class="chip">Exportar</span></div></div>'+
      '<div class="table-scroll"><table><thead>'+thead+'</thead><tbody>'+tbody+'</tbody></table></div></div>';
}
function switchTab(id){TAB=id;renderSidebar();renderContent();closeSidebar();window.scrollTo(0,0);}

function openSidebar(){document.getElementById("sidebar").classList.add("open");document.getElementById("overlay").classList.add("show");}
function closeSidebar(){document.getElementById("sidebar").classList.remove("open");document.getElementById("overlay").classList.remove("show");}

var toastTimer;
function toast(title,msg){document.getElementById("toastTitle").textContent=title;document.getElementById("toastMsg").textContent=msg||"";var t=document.getElementById("toast");t.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(function(){t.classList.remove("show")},3200);}
function featureToast(label){toast("“"+label+"”","Recurso disponível na versão completa. Solicite uma demonstração.");}
function openDemo(){window.open(waUrl(m.name),"_blank","noopener");}

(function init(){
  var erp=document.querySelector(".erp");
  erp.style.setProperty("--acc",m.acc); erp.style.setProperty("--acc-d",m.accD);
  document.querySelectorAll(".wa-link").forEach(function(a){a.href=waUrl(m.name);a.target="_blank";a.rel="noopener";});
  document.querySelectorAll(".demo-btn").forEach(function(b){b.onclick=openDemo;});
  renderSidebar(); renderContent();
})();

</script>
</body>
